# Chaveado por "MÉTODO /caminho" (estável mesmo se o operationId mudar —
# ver comentário no topo de src/plugins/business-plugin.js).
#
# `summary`/`description` foram removidos de propósito (limpeza pedida em
# 2026-07) — sem texto personalizado ainda pronto, o summary/description
# original do backend aparece sem modificação. Isso é conteúdo de
# "engenharia de escrita voltada ao cliente" — entra aqui quando o texto
# final estiver pronto, chaveado do mesmo jeito.
#
# `postResponseScript` NÃO foi removido — não é texto de marketing, é o
# mecanismo funcional que faz o token ser compartilhado entre as APIs
# (vira a extensão `x-post-response`, formato Postman, executado pelo
# Scalar API Client depois de cada "Test Request" bem-sucedido). Grava o
# token em `pm.globals`, variável GLOBAL do workspace do Scalar — visível
# em QUALQUER documento aberto no mesmo portal, não só na Auth.
#
# O nome da variável ('sci_auth_token') precisa bater exatamente com
# SHARED_TOKEN_VARIABLE em apis.manifest.js — scripts/verify-shared-token.js
# checa isso automaticamente no pipeline de build.
#
# Ver README, seção "Como o token é compartilhado entre as APIs".

"POST /api/v1/auth/credencial/login":
  postResponseScript: |
    const data = pm.response.json();
    if (data && typeof data.token === 'string' && data.token) {
      pm.globals.set('sci_auth_token', data.token);
      pm.test('Token capturado e compartilhado com as demais APIs', () => {
        pm.expect(data.token).to.be.a('string');
      });
    }

"POST /api/v1/auth/refresh":
  postResponseScript: |
    const data = pm.response.json();
    if (data && typeof data.token === 'string' && data.token) {
      pm.globals.set('sci_auth_token', data.token);
      pm.test('Token renovado e compartilhado com as demais APIs', () => {
        pm.expect(data.token).to.be.a('string');
      });
    }
